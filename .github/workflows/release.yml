name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example 1.0.0 or v1.0.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: darwin
            arch: amd64
            runner: macos-15-intel
            artifact_glob: dist/*.dmg
          - target: darwin
            arch: arm64
            runner: macos-15
            artifact_glob: dist/*.dmg
          - target: linux
            arch: amd64
            runner: ubuntu-latest
            artifact_glob: dist/*.tar.gz
          - target: windows
            arch: amd64
            runner: windows-latest
            artifact_glob: dist/*.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: latest
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Linux Wails dependencies
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libgtk-4-dev libwebkitgtk-6.0-dev

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            version="${{ inputs.version }}"
          else
            version="${GITHUB_REF_NAME}"
          fi
          version="${version#v}"
          if [[ -z "$version" ]]; then
            echo "empty release version" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Build package
        shell: bash
        run: ./scripts/build_wails.sh --target "${{ matrix.target }}" --arch "${{ matrix.arch }}"
        env:
          VERSION: ${{ steps.version.outputs.version }}

      - name: Upload package artifact
        uses: actions/upload-artifact@v7
        with:
          name: ecorplink-${{ matrix.target }}-${{ matrix.arch }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error
          retention-days: 7

  release:
    name: Publish release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            version="${{ inputs.version }}"
            tag="v${version#v}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Download package artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          files: release-artifacts/*
          fail_on_unmatched_files: true
